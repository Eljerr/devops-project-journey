apiVersion: argoproj.io/v1aplha1
kind: Aplication
metadata:
  name: root-app-of-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/Eljerr/devops-project-portofolio.git"
    tagetRevision: main
    path: platform-tools/argocd
destination:
  server: "https://kubernetes.default.svc"
  namespace: argocd
syncPolicy:
  automated:
    prune: true
    selHeal: true
