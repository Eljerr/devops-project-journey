global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: 'k3s-nodes'
    static_configs:
      - targets:
        - '192.168.18.200:9100'
        - '192.168.18.201:9100'
        - '192.168.18.202:9100'
        - 'node-exporter:9100'

  - job_name: "stb-gateway"
    static_configs:
      - targets:
          - ["IP_STB_GATEWAY:9090"]

  - job_name: "docker-containers"
    static_configs:
      - targets: ["cAdvisor:8080"]
        labels:
          host: "sec-ops"

      - targets: ["IP_STB_GATEWAY:8080"]
        labels:
          host: "stb-gateway"

rule_files:
  - 'alert.rules.yml'

alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - 'alertmanager:9093'
