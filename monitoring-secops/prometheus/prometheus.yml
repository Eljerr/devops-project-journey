global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: 'k3s-nodes'
    static_configs:
      - targets:
          - '${NODE_1}:9100'
          - '${NODE_2}:9100'
          - '${NODE_#}:9100'

  - job_name: "stb-gateway"
    static_configs:
      - targets: ["${STB_IP}:9090"]

  - job_name: "docker-containers"
    static_configs:
      - targets: ["cAdvisor:8080"]
        labels:
          host: "sec-ops"

      - targets: ["${STB_IP}:8080"]
        labels:
          host: "stb-gateway"

  - job_name: 'kube-state-metrics'
    static_configs:
      - targets: ['${KUBE_MASTER}:${PORT_KUBE}']

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
      - targets:
        - 'alertmanager:9093'
