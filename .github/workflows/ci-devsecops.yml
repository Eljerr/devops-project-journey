on:
  push:
    branches:
      - main
    paths:
      - "src-app/**"

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/project-02-api:v1.0.0${{ github.run.number }} ./src-app

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image: "${{ secrets.DOCKER_USERNAME }}/project-02-api:v1.0.${{ github.run_number }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Login to Dokcer Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secret.DOCKER_PASSWORD }}

      - name: Push Image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/project-02-api:v1.0.${{ github.run_number }}
