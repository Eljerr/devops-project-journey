on:
  push:
    branches:
      - main
    paths:
      - "src-app/**"
  workflow_dispatch:

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Setup Node.js and Enable Caching
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src-app/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: ./src-app

      - name: Run Unit Test (Quality Gate)
        run: npm test
        working-directory: ./src-app

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/project-02-api:v1.0.${{ github.run_number }} \
            ./src-app

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKERHUB_USERNAME }}/project-02-api:v1.0.${{ github.run_number }}"
          format: "sarif"
          output: 'trivy-results.sarif'
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results to Github Security tab
        uses: github/codeql-actions/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/project-02-api:v1.0.${{ github.run_number }}

      - name: Update Kubernetes Manifest (GitOps Handoff)
        run: |
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/project-02-api:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/project-02-api:v1.0.${{ github.run_number }}|g" projects/02-nodejs-api/backend.yaml
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add projects/02-nodejs-api/backend.yaml
          git commit -m "chore: auto-update image tag to v1.0.${{ github.run_number }}"
          git push origin main
